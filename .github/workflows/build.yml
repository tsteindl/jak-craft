name: CI Build

# Verifies the mod compiles on pull requests. The push-to-main build that actually
# ships to the Minecraft server lives in deploy.yml.
on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/*.jar
